# docker-compose.yml
version: '3.8'

services:
  # ─────────────── NGINX ───────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html:ro
    depends_on:
      - app
      - reverb
    networks:
      - canopy-net
    restart: unless-stopped

  # ─────────────── APP (PHP-FPM) ───────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-canopy}
      - DB_USERNAME=${DB_USERNAME:-canopy}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - FILESYSTEM_DISK=s3
      - AWS_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - AWS_BUCKET=${MINIO_BUCKET:-canopy-files}
      - AWS_USE_PATH_STYLE_ENDPOINT=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - canopy-net
    restart: unless-stopped

  # ─────────────── REVERB (WebSocket) ───────────────
  reverb:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment:
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - canopy-net
    restart: unless-stopped

  # ─────────────── QUEUE WORKER ───────────────
  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    environment:
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
    depends_on:
      - app
    networks:
      - canopy-net
    restart: unless-stopped

  # ─────────────── SCHEDULER ───────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - canopy-net
    restart: unless-stopped

  # ─────────────── POSTGRESQL ───────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-canopy}
      POSTGRES_USER: ${DB_USERNAME:-canopy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-canopy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - canopy-net
    restart: unless-stopped

  # ─────────────── REDIS ───────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - canopy-net
    restart: unless-stopped

  # ─────────────── MINIO ───────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - canopy-net
    restart: unless-stopped

networks:
  canopy-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:
  vendor:
  node_modules:
